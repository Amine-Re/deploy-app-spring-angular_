name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v3

      # Étape 2 : Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Étape 3 : Compiler le backend Spring Boot
      - name: Build Spring Boot JAR
        run: |
          cd springboot/app
          mvn clean package -DskipTests

      # Étape 4 : Build et Push image Backend
      - name: Build and Push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # Étape 5 : Build et Push image Frontend
      - name: Build and Push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # Étape 6 : Tester avec Docker Compose
      - name: Start application with Docker Compose
        run: |
          docker-compose up -d
          sleep 20

      # Étape 7 : Vérifier que les conteneurs tournent
      - name: Check running containers
        run: docker ps
